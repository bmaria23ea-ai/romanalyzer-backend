services:
  - type: web
    name: Backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Plan gratuito, NO incluye disco persistente.La DB SQLite se borra en cada deploy/restart.
    plan: free
    # Variables de entorno
    envVars:
      - key: PORT
        value: 10000          # Puerto por defecto (Render lo asigna automáticamente)
      - key: TURSO_URL
        sync: false           # Lo ingresas manualmente en el dashboard de Render
      - key: TURSO_TOKEN
        sync: false           # Lo ingresas manualmente en el dashboard de Render
      - key: ROM_API_KEY
        generateValue: true   # Render genera un valor aleatorio seguro automáticamente

