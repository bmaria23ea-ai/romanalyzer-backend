ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CORS — se aplica a TODAS las respuestas incluyendo OPTIONS
    Header always set Access-Control-Allow-Origin  "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type"

    RewriteEngine On

    # OPTIONS preflight → 204 directamente con las cabeceras CORS ya puestas
    RewriteCond %{REQUEST_METHOD} ^OPTIONS$
    RewriteRule ^ - [R=204,L]

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
