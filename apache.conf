ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        AcceptPathInfo On
    </Directory>

    RewriteEngine On

    # Pasar OPTIONS directamente a PHP (preflight CORS)
    RewriteCond %{REQUEST_METHOD} ^OPTIONS$
    RewriteRule ^api/sessions\.php(/.*)?$ /api/sessions.php [L,QSA]

    # Permitir path info para PATCH/DELETE: /api/sessions.php/42
    RewriteRule ^api/sessions\.php(/[^/]+)?$ /api/sessions.php$1 [L,QSA,PT]

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
