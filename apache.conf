# ─────────────────────────────────────────────────────────────────────
# apache.conf — Configuración del VirtualHost principal
# Apache HTTP Server para ROMAnalyzer API
# ─────────────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # ── Directorio raíz ────────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Directorio de la API ────────────────────────────────────────
    <Directory /var/www/html/api>
        Options -Indexes
        AllowOverride None
        Require all granted

        # Cabeceras CORS globales (refuerzo adicional al PHP)
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type"
    </Directory>

    # ── Enrutamiento: /api/sessions → sessions.php ─────────────────
    # Permite URLs limpias tipo /api/sessions/42 sin ?id=42
    RewriteEngine On

    # Manejar pre-flight OPTIONS directamente
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^ - [R=204,L]

    # Redirigir /api/sessions[/cualquier-cosa] → sessions.php
    RewriteRule ^api/sessions(/.*)?$ /api/sessions.php [L,QSA]

    # ── Health-check (Render lo usa para saber si el servicio está vivo)
    RewriteRule ^health$ - [R=200,L]

    # ── Logs ───────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
